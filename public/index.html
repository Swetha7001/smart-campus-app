<!DOCTYPE html>
<html>
<head>
  <title>Smart Campus App Pro</title>

  <style>
    body {
      margin: 0;
      font-family: Arial, sans-serif;
      background-color: #141414;
      color: white;
      text-align: center;
    }

    h2 { color: #e50914; }

    .container { margin-top: 50px; }

    input {
      padding: 10px;
      margin: 8px;
      width: 250px;
      border-radius: 5px;
      border: none;
    }

    button {
      padding: 10px 20px;
      margin: 10px;
      border: none;
      border-radius: 5px;
      background-color: #e50914;
      color: white;
      cursor: pointer;
      font-weight: bold;
    }

    button:hover { background-color: #f6121d; }

    .card {
      background-color: #222;
      padding: 20px;
      margin: 20px auto;
      width: 380px;
      border-radius: 10px;
    }

    #dashboard { display: none; }

    .grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(320px, 1fr));
      gap: 15px;
      padding: 20px;
    }

    .box {
      background: #1f1f1f;
      padding: 15px;
      border-radius: 10px;
      height: 280px;
      overflow-y: auto;
      text-align: left;
    }

    .msg {
      padding: 8px;
      margin: 5px 0;
      border-radius: 8px;
      background: #333;
    }

    .me { background: #e50914; }

    a { color: #00e5ff; }
  </style>
</head>

<body>

<div class="container" id="authSection">
  <h2>Smart Campus</h2>

  <div class="card">
    <h3>Register</h3>
    <input type="email" id="regEmail" placeholder="Email"><br>
    <input type="password" id="regPassword" placeholder="Password"><br>
    <button onclick="register()">Register</button>
  </div>

  <div class="card">
    <h3>Login</h3>
    <input type="email" id="loginEmail" placeholder="Email"><br>
    <input type="password" id="loginPassword"><br>
    <button onclick="login()">Login</button>
  </div>
</div>

<!-- DASHBOARD -->
<div id="dashboard">

  <h2>🎬 Smart Campus Dashboard</h2>

  <div class="card">
    <p id="userInfo"></p>
    <button onclick="logout()">Logout</button>
  </div>

  <div class="grid">

    <!-- CHAT -->
    <div class="box">
      <h3>💬 Chat</h3>
      <input type="text" id="messageInput" placeholder="Enter message">
      <button onclick="sendMessage()">Send</button>
      <div id="messages"></div>
    </div>

    <!-- FILES -->
    <div class="box">
      <h3>📁 Files</h3>
      <input type="file" id="fileInput">
      <button onclick="uploadFile()">Upload</button>
      <div id="files"></div>
    </div>

    <!-- ATTENDANCE -->
    <div class="box">
      <h3>📊 Attendance</h3>
      <button onclick="markAttendance('Present')">Present</button>
      <button onclick="markAttendance('Absent')">Absent</button>
      <div id="attendanceBox"></div>
    </div>

    <!-- TIMETABLE -->
    <div class="box">
      <h3>📅 Timetable</h3>
      <p>Mon - Cloud Computing</p>
      <p>Tue - Mobile Backend</p>
      <p>Wed - AI</p>
      <p>Thu - DevOps</p>
      <p>Fri - Project</p>
    </div>

    <!-- NOTIFICATIONS -->
    <div class="box">
      <h3>🔔 Notifications</h3>
      <input type="text" id="noticeInput" placeholder="Admin notice">
      <button onclick="postNotice()">Post</button>
      <div id="noticeBox"></div>
    </div>

  </div>
</div>

<script type="module">

import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";

import {
  getAuth,
  createUserWithEmailAndPassword,
  signInWithEmailAndPassword,
  onAuthStateChanged,
  signOut
} from "https://www.gstatic.com/firebasejs/10.7.1/firebase-auth.js";

import {
  getFirestore,
  addDoc,
  collection,
  onSnapshot,
  serverTimestamp
} from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

import {
  getStorage,
  ref,
  uploadBytes,
  getDownloadURL
} from "https://www.gstatic.com/firebasejs/10.7.1/firebase-storage.js";

/* FIREBASE */
const firebaseConfig = {
  apiKey: "HIDDEN",
  authDomain: "HIDDEN",
  projectId: "HIDDEN",
  storageBucket: "HIDDEN",
  messagingSenderId: "HIDDEN",
  appId: "HIDDEN"
};

const app = initializeApp(firebaseConfig);
const auth = getAuth(app);
const db = getFirestore(app);
const storage = getStorage(app);

let user = null;

/* AUTH */
window.register = () =>
  createUserWithEmailAndPassword(auth, regEmail.value, regPassword.value);

window.login = () =>
  signInWithEmailAndPassword(auth, loginEmail.value, loginPassword.value);

window.logout = () => signOut(auth);

/* CHAT */
window.sendMessage = async () => {
  if (!user) return;
  await addDoc(collection(db,"chat"), {
    text: messageInput.value,
    user: user.email,
    time: serverTimestamp()
  });
  messageInput.value="";
};

onSnapshot(collection(db,"chat"), snap=>{
  messages.innerHTML="";
  snap.forEach(d=>{
    let x=d.data();
    let div=document.createElement("div");
    div.className="msg";
    div.innerText=x.user+": "+x.text;
    messages.appendChild(div);
  });
});

/* FILES */
window.uploadFile = async () => {
  let f = fileInput.files[0];
  let r = ref(storage,"uploads/"+Date.now()+"_"+f.name);

  await uploadBytes(r,f);
  let url = await getDownloadURL(r);

  await addDoc(collection(db,"files"), {
    name:f.name,
    url:url,
    user:user.email
  });
};

onSnapshot(collection(db,"files"), snap=>{
  files.innerHTML="";
  snap.forEach(d=>{
    let x=d.data();
    files.innerHTML += `<div class="msg"><a href="${x.url}" target="_blank">${x.name}</a></div>`;
  });
});

/* ATTENDANCE */
window.markAttendance = async (status) => {
  await addDoc(collection(db,"attendance"), {
    status,
    user:user.email,
    time: serverTimestamp()
  });
};

onSnapshot(collection(db,"attendance"), snap=>{
  attendanceBox.innerHTML="";
  snap.forEach(d=>{
    let x=d.data();
    attendanceBox.innerHTML += `<div class="msg">${x.user} - ${x.status}</div>`;
  });
});

/* NOTICES */
window.postNotice = async () => {
  await addDoc(collection(db,"notifications"), {
    text: noticeInput.value,
    time: serverTimestamp()
  });
  noticeInput.value="";
};

onSnapshot(collection(db,"notifications"), snap=>{
  noticeBox.innerHTML="";
  snap.forEach(d=>{
    noticeBox.innerHTML += `<div class="msg">${d.data().text}</div>`;
  });
});

/* AUTH STATE */
onAuthStateChanged(auth,(u)=>{
  if(u){
    user=u;
    authSection.style.display="none";
    dashboard.style.display="block";
    userInfo.innerText="Welcome "+u.email;
  } else {
    user=null;
    authSection.style.display="block";
    dashboard.style.display="none";
  }
});

</script>

</body>
</html>
